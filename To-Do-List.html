<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>To Do List</title>
</head>

<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="bg-purple-500 text-white p-8 text-center">
            <h1 class="text-4xl font-bold">Weekly To Do List</h1>
            <p class="mt-3 text-lg">
                Organize your tasks for each day of the week
            </p>
        </div>

        <!-- Form Section -->
        <div class="p-8">

            <span id="error"></span>
            <form id="taskForm" class="grid md:grid-cols-3 gap-4">

                <input type="text" id="Input" placeholder="Enter your task"
                    class="border border-gray-300 p-4 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                <select id="daySelect"
                    class="border border-gray-300 p-4 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="monday">Monday</option>
                    <option value="tuesday">Tuesday</option>
                    <option value="wednesday">Wednesday</option>
                    <option value="thursday">Thursday</option>
                    <option value="friday">Friday</option>
                    <option value="saturday">Saturday</option>
                    <option value="sunday">Sunday</option>
                </select>

                <button type="submit"
                    class="bg-purple-500 hover:bg-purple-600 text-white font-semibold rounded-xl p-4 transition duration-300">
                    Add Task
                </button>

            </form>

        </div>

        <!-- Table Section -->
        <div class="overflow-x-auto p-8">

            <table class="w-full border border-gray-300 text-center">

                <thead class="bg-purple-500 text-white">

                    <tr>
                        <th class="border p-4">Monday</th>
                        <th class="border p-4">Tuesday</th>
                        <th class="border p-4">Wednesday</th>
                        <th class="border p-4">Thursday</th>
                        <th class="border p-4">Friday</th>
                        <th class="border p-4">Saturday</th>
                        <th class="border p-4">Sunday</th>
                    </tr>

                </thead>

                <tbody>

                    <tr class="h-64">

                        <td id="monday" class="border p-3 align-top"></td>

                        <td id="tuesday" class="border p-3 align-top"></td>

                        <td id="wednesday" class="border p-3 align-top"></td>

                        <td id="thursday" class="border p-3 align-top"></td>

                        <td id="friday" class="border p-3 align-top"></td>

                        <td id="saturday" class="border p-3 align-top"></td>

                        <td id="sunday" class="border p-3 align-top"></td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>




</body>
<script>
    const form = document.querySelector('#taskForm');
    const input = document.getElementById('Input');
    const taskList = document.getElementById('task-list');
    const error = document.getElementById('error')
    const daySelect = document.getElementById('daySelect');

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        // this prevent the fom=rm from refresing the page when submit button is clicked

        const task = input.value.trim();
        // this prevermt the input from being empty and also remove any extra spaces before and after the input
       
        if (task) {
    //    if there is an input then the code will run but if there is no input then the else statement will run
            
            const selectedDay = daySelect.value;
            // this one grabs the value of the selected day from the dropdown menu and store it in a variable called selectedDay

            const dayCell = document.getElementById(selectedDay);
            // this one grabs the table cell element that corresponds to the selected day using its id and store it in a variable called dayCell
          
            const taskDiv = document.createElement('div');
            // this one create a new div element that will represent the task inputed  and store it in a variable called taskDiv
           
            taskDiv.textContent = task;
            // this one stores  the inputed task to the div

            dayCell.appendChild(taskDiv);
            // this one adds the task div to the corresponding day cell in the table, displaying the task under the selected day
           
            taskDiv.classList.add('bg-gray-200', 'p-2', 'rounded-lg', 'mb-2');
            //  this one adds some styling to the task div 
         
            error.textContent = "Task successfully Added"
            // this is the message that will display when the task is successfully added

            error.style.color = "Green"
            // the color of the message will be green when the task is successfully added

            error.style.fontFamily = "Arial"
            // this one changes the font of the message to Arial
         
            input.value = "";
            // this one emptys the input field after the task is added so that the user can enter a new task without having to manually delete the previous input


        } else {
            error.textContent = "please input a task"
            error.style.color = "red"
        }
    })
</script>

</html>
